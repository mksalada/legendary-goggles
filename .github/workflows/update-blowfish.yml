name: Update Blowfish Theme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  update-theme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest Blowfish
        run: |
          curl -s https://api.github.com/repos/nunocoracao/blowfish/releases/latest \
          | grep "zipball_url" \
          | cut -d '"' -f 4 \
          | wget -qi -

      - name: Replace theme
        run: |
          rm -rf themes/blowfish
          mkdir -p themes/blowfish
          unzip *.zip -d temp
          mv temp/*/* themes/blowfish
          rm -rf temp *.zip

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add themes/blowfish
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Blowfish theme"
          git push
