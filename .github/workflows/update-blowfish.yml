name: Update Blowfish Theme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  update-theme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get latest release version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/nunocoracao/blowfish/releases/latest | grep tag_name | cut -d '"' -f 4)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download Blowfish
        run: |
          curl -L -o blowfish.zip https://github.com/nunocoracao/blowfish/archive/refs/tags/${{ env.VERSION }}.zip

      - name: Replace theme
        run: |
          rm -rf themes/blowfish
          mkdir -p themes/blowfish
          unzip blowfish.zip -d temp
          mv temp/blowfish-*/* themes/blowfish
          rm -rf temp blowfish.zip

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add themes/blowfish
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Blowfish to $VERSION"
          git push
